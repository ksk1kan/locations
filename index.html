<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="color-scheme" content="dark" />
  <title>FL Konum - Offline Arama</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" href="./favicon-32.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="stylesheet" href="./app.css" />

  <meta name="description" content="Fethiye Lovers şoförleri için offline konum arama ve Google Maps'e tek tıkla yönlendirme." />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="brand">
        <img src="./fl_logo.png" alt="Fethiye Lovers Travel Agency" />
        <div class="title">
          <b>Konum Bul</b>
          <span>Offline PWA • Google Maps linki</span>
        </div>
      </div>
      <div class="badges">
        <span id="netBadge" class="badge">…</span>
      </div>
    </header>

    <main class="main">
      <section class="searchCard" aria-label="Arama">
        <div class="searchRow">
          <input id="q" class="searchInput" type="search" inputmode="search"
                 placeholder="Müşteri / Villa / Site / Apart adı yaz…" autocomplete="off" />
          <button id="searchBtn" class="btn primary" type="button">Ara</button>
          <button id="clearBtn" class="btn" type="button">Temizle</button>
        </div>
        <div class="smallRow">
          <div class="hint" id="helperText">Yükleniyor…</div>
          <div class="kpis">
            <span class="badge" id="countText">…</span>
            <span class="badge" id="buildStamp">…</span>
          </div>
        </div>
      </section>

      <section class="results" aria-label="Sonuçlar">
        <div class="resultsHeader">
          <div>
            <h2>Sonuçlar</h2>
            <p>Kartın üzerine dokun → detaylar ve link butonları açılır.</p>
          </div>
        </div>
        <div id="list" class="list"></div>
      </section>
    </main>

    <footer class="footer">
      <span>© Fethiye Lovers Travel Agency • Sürüm: Offline PWA</span>
      <img src="./baf_logo.png" alt="Birkan Arslan Filiz" />
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <div style="display:flex;flex-direction:column;gap:2px">
      <b id="toastMsg">…</b>
      <span>Gerekirse sayfayı yenile.</span>
    </div>
    <button id="toastBtn" class="btn primary" type="button" style="display:none">Yenile</button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
